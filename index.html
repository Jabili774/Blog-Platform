<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Platform</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar">
    <div class="logo">
        <i class="fa-solid fa-blog"></i>
        Blog Platform
    </div>

    <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="create.html">Create Blog</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>

<!-- Hero -->

<section class="hero">
    <h1>Share Your Ideas With The World</h1>

    <p>
        Create blogs, read articles and interact with comments.
    </p>

    <a href="create.html" class="btn">
        Write Blog
    </a>
</section>

<!-- Search -->

<section class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="Search blog title..."
        onkeyup="searchBlogs()">

</section>

<!-- Blog Container -->

<section class="blogs">

    <div id="blogContainer" class="blog-grid">

    </div>

</section>

<!-- Footer -->

<footer>

    <h3>Blog Platform</h3>

    <p>
        Frontend Project using HTML, CSS and JavaScript.
    </p>

</footer>

<script src="js/script.js"></script>

</body>
</html>
